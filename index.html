<meta name="apple-mobile-web-app-capable" content="yes">

<!-- CSS -->
<link rel="stylesheet" href="css/variables.css?v=4">
<link rel="stylesheet" href="css/base.css?v=4">
<link rel="stylesheet" href="css/layout.css?v=4">
<link rel="stylesheet" href="css/components.css?v=4">
<link rel="stylesheet" href="css/pages.css?v=4">
</head>
<body>

<svg aria-hidden="true" class="ui-sprite" xmlns="http://www.w3.org/2000/svg">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4.5v-6h3v6H18a1 1 0 0 0 1-1V9.5"/></symbol>
  <symbol id="i-folder" viewBox="0 0 24 24"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"/></symbol>
  <symbol id="i-images" viewBox="0 0 24 24"><rect x="3" y="5" width="14" height="14" rx="2"/><path d="M17 8h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-2"/><circle cx="8.5" cy="10" r="1.2"/><path d="M5.5 16l3.2-3.2a1.3 1.3 0 0 1 1.8 0l1.4 1.4 2.2-2.2a1.3 1.3 0 0 1 1.8 0L17 13.1"/></symbol>
  <symbol id="i-message" viewBox="0 0 24 24"><path d="M6 18l-3 3V6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v8A2.5 2.5 0 0 1 18.5 17H6z"/></symbol>
  <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></symbol>
  <symbol id="i-project" viewBox="0 0 24 24"><path d="M9 6V4.8A1.8 1.8 0 0 1 10.8 3h2.4A1.8 1.8 0 0 1 15 4.8V6"/><rect x="3" y="6" width="18" height="14" rx="2"/><path d="M3 11h18"/></symbol>
  <symbol id="i-settings" viewBox="0 0 24 24"><path d="M12 3l1 2.7a7.6 7.6 0 0 1 2 .8L17.7 5l1.8 1.8-1.5 2.7c.3.6.6 1.3.8 2L21 12l-2.2 1c-.2.7-.5 1.4-.8 2l1.5 2.7-1.8 1.8-2.7-1.5c-.6.3-1.3.6-2 .8L12 21l-1-2.2a7.6 7.6 0 0 1-2-.8L6.3 19 4.5 17.2 6 14.5a7.6 7.6 0 0 1-.8-2L3 12l2.2-1c.2-.7.5-1.4.8-2L4.5 6.3 6.3 4.5 9 6c.6-.3 1.3-.6 2-.8z"/><circle cx="12" cy="12" r="3.2"/></symbol>

  <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></symbol>
  <symbol id="i-camera" viewBox="0 0 24 24"><path d="M4 8.5A2.5 2.5 0 0 1 6.5 6H9l1.3-2h3.4L15 6h2.5A2.5 2.5 0 0 1 20 8.5v8a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 16.5z"/><circle cx="12" cy="12.5" r="3.5"/></symbol>
  <symbol id="i-wallet" viewBox="0 0 24 24"><path d="M4 8a2 2 0 0 1 2-2h11a2 2 0 0 1 2 2v1H6a2 2 0 0 0-2 2z"/><path d="M4 11a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><circle cx="16.5" cy="14.5" r="1"/></symbol>

<header class="hd">
  <div class="hd-copy">
    <p class="hd-eyebrow">Photographer Workspace</p>
    <h1 id="hT">工作台</h1>
  </div>
  <button class="hbtn" onclick="A.openSet()" aria-label="打开设置">
    <svg class="ui-ic"><use href="#i-settings"></use></svg>
  </button>
</header>

<!-- ====== 首页 ====== -->
<section class="pg on" id="pg-home">
  <div class="home-shell">
    <div class="home-intro">
      <p class="home-kicker">Studio Desk</p>
      <h2>今天的拍摄节奏</h2>
      <p>把档期、收入、清单和素材收在一个安静的工作台里。</p>
    </div>
    <div id="secToday"></div>
    <div id="secStats"></div>
    <div id="secCheck"></div>
    <div id="secRecent"></div>
    <div class="sn">快捷操作</div>
    <div class="qa">
      <button class="qai" onclick="A.newProj()"><span class="qi"><svg class="ui-ic"><use href="#i-project"></use></svg></span><span class="qt"><strong>新建项目</strong><small>记录新档期与报价</small></span></button>
      <button class="qai" onclick="A.nav('cust')"><span class="qi"><svg class="ui-ic"><use href="#i-user"></use></svg></span><span class="qt"><strong>客户</strong><small>查看联系人与历史</small></span></button>
      <button class="qai" onclick="A.lt='res';A.nav('lib')"><span class="qi"><svg class="ui-ic"><use href="#i-folder"></use></svg></span><span class="qt"><strong>资源库</strong><small>发给客户的资料</small></span></button>
      <button class="qai" onclick="A.lt='ref';A.nav('lib')"><span class="qi"><svg class="ui-ic"><use href="#i-images"></use></svg></span><span class="qt"><strong>参考图</strong><small>收集风格与灵感</small></span></button>
      <button class="qai" onclick="A.lt='rep';A.nav('lib')"><span class="qi"><svg class="ui-ic"><use href="#i-message"></use></svg></span><span class="qt"><strong>话术库</strong><small>统一沟通表达</small></span></button>
      <button class="qai" onclick="A.nav('cal')"><span class="qi"><svg class="ui-ic"><use href="#i-calendar"></use></svg></span><span class="qt"><strong>日历</strong><small>查看本月拍摄安排</small></span></button>
    </div>
  </div>
</section>

<!-- ====== 项目 ====== -->
<section class="pg" id="pg-proj">
  <div class="page-intro page-intro-proj">
    <p class="page-kicker">Projects</p>
    <h2>项目工作台</h2>
    <p>按阶段查看客户档期、报价与收款，让每一次拍摄都留在清晰的节奏里。</p>
  </div>
  <div class="fp" id="pf"></div>
  <div id="plist"></div>
  <button class="bt bt-p bt-fw" onclick="A.newProj()" style="margin-top:8px"><svg class="ui-ic"><use href="#i-plus"></use></svg>新建项目</button>
</section>

<!-- ====== 日历 ====== -->
<section class="pg" id="pg-cal">
  <div class="page-intro page-intro-cal">
    <p class="page-kicker">Calendar</p>
    <h2>拍摄日历</h2>
    <p>按月份查看档期，把每天的拍摄安排和项目进度对应起来。</p>
  </div>
  <div class="cd cal-shell"><div class="ch"><button class="bt bt-gh bt-s bt-ic" onclick="A.cp()" aria-label="上一月"><svg class="ui-ic"><use href="#i-chevron-left"></use></svg></button><span class="cml" id="cmo"></span><button class="bt bt-gh bt-s bt-ic" onclick="A.cn()" aria-label="下一月"><svg class="ui-ic"><use href="#i-chevron-right"></use></svg></button></div><div class="cg" id="cdh"></div><div class="cg" id="cbd"></div></div>
  <div class="cd cal-list"><div class="chd"><span class="ct" id="clt">当日拍摄</span></div><div id="clst"></div></div>
</section>

<!-- ====== 资料库 ====== -->
<section class="pg" id="pg-lib">
  <div class="page-intro page-intro-lib">
    <p class="page-kicker">Library</p>
    <h2>资料与参考</h2>
    <p>整理发给客户的资源、参考图灵感和常用沟通话术。</p>
  </div>
  <div class="stb">
    <button class="sti on" data-lt="res" onclick="A.lt='res';A.rLib()"><svg class="ui-ic"><use href="#i-folder"></use></svg><span>资源库</span></button>
    <button class="sti" data-lt="ref" onclick="A.lt='ref';A.rLib()"><svg class="ui-ic"><use href="#i-images"></use></svg><span>参考图</span></button>
    <button class="sti" data-lt="rep" onclick="A.lt='rep';A.rLib()"><svg class="ui-ic"><use href="#i-message"></use></svg><span>话术库</span></button>
  </div>
  <div id="lc"></div>
</section>

<!-- ====== 客户 ====== -->
<section class="pg" id="pg-cust">
  <div class="page-intro page-intro-cust">
    <p class="page-kicker">Clients</p>
    <h2>客户关系</h2>
    <p>查看沟通入口、联系方式和拍摄历史，把重复合作关系留在手边。</p>
  </div>
  <div id="custL"></div>
  <button class="bt bt-p bt-fw" onclick="A.newCust()" style="margin-top:8px"><svg class="ui-ic"><use href="#i-plus"></use></svg>添加客户</button>
</section>

<!-- ====== 底部导航 ====== -->
<nav class="nv">
  <button class="ni on" data-t="home" onclick="A.nav('home')"><span class="ic"><svg class="ui-ic"><use href="#i-home"></use></svg></span><span class="ilb">首页</span></button>
  <button class="ni" data-t="proj" onclick="A.nav('proj')"><span class="ic"><svg class="ui-ic"><use href="#i-project"></use></svg></span><span class="ilb">项目</span></button>
  <button class="ni" data-t="cal" onclick="A.nav('cal')"><span class="ic"><svg class="ui-ic"><use href="#i-calendar"></use></svg></span><span class="ilb">日历</span></button>
  <button class="ni" data-t="lib" onclick="A.nav('lib')"><span class="ic"><svg class="ui-ic"><use href="#i-folder"></use></svg></span><span class="ilb">资料</span></button>
  <button class="ni" data-t="cust" onclick="A.nav('cust')"><span class="ic"><svg class="ui-ic"><use href="#i-user"></use></svg></span><span class="ilb">客户</span></button>
</nav>

</body>
</html>
